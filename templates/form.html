<!DOCTYPE html>
<html>

<body>
    <h2>Enter your name to talk to the Python Server!</h2>

    <!-- A form sends data to the server when submitted -->
    <form method="POST">
        <label>Your Name:</label>
        <!-- The name="person_name" is incredibly important. That's the key Python looks for! -->
        <input type="text" name="person_name">
        <button type="submit">Send to Server</button>
    </form>
</body>

</html>
