<!DOCTYPE html>
<html>
<head>
    <title>JRPG Arena (Elite Edition)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Play&display=swap" rel="stylesheet">
    <style>
        body {
            /* Now using highly compressed WebP! */
            background-image: url('{{ url_for("static", filename="images/bg.webp") }}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            color: #ffffff;
            font-family: 'Play', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            text-shadow: 2px 2px 10px #000;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .container {
            width: 800px;
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .battlefield {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 350px;
        }

        .fighter {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 250px;
        }

        .portrait {
            width: 200px;
            height: 200px;
            border-radius: 10px;
            border: 3px solid #b8b8b8;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            object-fit: cover;
            animation: breathe 3s ease-in-out infinite alternate;
        }

        @keyframes breathe {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }

        .name {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            margin-top: 15px;
            text-shadow: 1px 1px 5px #000;
        }

        .hp-bar-container {
            width: 100%;
            height: 20px;
            background-color: #333;
            border: 2px solid #000;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
            box-shadow: inset 0px 0px 5px #000;
        }

        .hp-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            transition: width 0.5s ease-out;
        }

        .potions {
            margin-top: 10px;
            color: #1e90ff;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .logs-and-controls {
            display: flex;
            gap: 20px;
            justify-content: space-between;
        }

        .logs {
            flex-grow: 1;
            text-align: left;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 10px;
            height: 120px;
            overflow-y: auto;
            border: 1px inset #555;
            font-family: monospace;
            font-size: 1.1rem;
        }

        .log-entry {
            margin: 5px 0;
            color: #d1d8e0;
        }
        .log-entry:first-child {
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .controls {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
            min-width: 200px;
        }

        button {
            background: linear-gradient(180deg, #444, #222);
            color: white;
            border: 2px solid #555;
            padding: 15px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 8px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }

        button:hover {
            background: linear-gradient(180deg, #666, #333);
            border-color: #888;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .btn-attack {
            border-color: #ff4757;
            color: #ff6b81;
        }

        .btn-heal {
            border-color: #1e90ff;
            color: #70a1ff;
        }

        .game-over {
            font-size: 2rem;
            color: #ffd32a;
            font-family: 'Cinzel', serif;
            text-shadow: 0 0 10px span;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>The Monster Arena</h1>
    <div class="container">
        
        <div class="battlefield">
            
            <div class="fighter">
                <img src="{{ url_for('static', filename='images/hero.webp') }}" class="portrait" alt="Hero">
                <div class="name">{{ player.name }}</div>
                
                <div class="hp-bar-container">
                    <div id="player-hp-bar" class="hp-bar" style="width: {{ (player.hp / 100.0) * 100 }}%;"></div>
                </div>
                <div style="margin-top: 5px;"><span id="player-hp-text">{{ player.hp }}</span> / 100</div>

                <div id="player-potions" class="potions">🧪 Potions: {{ player.potions }}</div>
            </div>

            <h2 style="font-family: 'Cinzel', serif; font-size: 3rem; color: #ffeb3b; text-shadow: 0 0 10px #ff0;">VS</h2>

            <div class="fighter">
                <img src="{{ url_for('static', filename='images/dragon.webp') }}" class="portrait" alt="Dragon" style="border-color: #ff4757;">
                <div class="name" style="color: #ff4757;">{{ dragon.name }}</div>
                
                <div class="hp-bar-container">
                    <div id="dragon-hp-bar" class="hp-bar" style="width: {{ (dragon.hp / 150.0) * 100 }}%;"></div>
                </div>
                <div style="margin-top: 5px;"><span id="dragon-hp-text">{{ dragon.hp }}</span> / 150</div>
            </div>

        </div>

        <div class="logs-and-controls">
            <div id="action-logs" class="logs">
                {% for log in logs %}
                    <div class="log-entry">{{ log }}</div>
                {% endfor %}
            </div>

            <!-- Controls (Now Javascript Powered) -->
            <div id="controls-container" class="controls">
                {% if game_over %}
                    <div class="game-over">BATTLE OVER</div>
                    <form action="/" method="GET" style="display: flex; flex-direction: column;">
                        <button type="submit" style="color: #2ed573; border-color: #2ed573;">Play Again</button>
                    </form>
                {% else %}
                    <button class="btn-attack" onclick="doAction('attack')">🗡️ Attack</button>
                    <button class="btn-heal" onclick="doAction('heal')">🧪 Heal</button>
                {% endif %}
            </div>
        </div>

    </div>

    <script>
        async function doAction(actionName) {
            // Send the request in the background
            const response = await fetch("/api/play", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ action: actionName })
            });

            const data = await response.json();

            // 1. Smoothly update HP Widths & Numbers
            document.getElementById("player-hp-text").innerText = Math.max(0, data.player_hp);
            document.getElementById("player-hp-bar").style.width = (Math.max(0, data.player_hp) / 100.0) * 100 + "%";
            document.getElementById("player-potions").innerText = "🧪 Potions: " + data.player_potions;
            
            document.getElementById("dragon-hp-text").innerText = Math.max(0, data.dragon_hp);
            document.getElementById("dragon-hp-bar").style.width = (Math.max(0, data.dragon_hp) / 150.0) * 100 + "%";

            // 2. Prepend Logs
            const logsContainer = document.getElementById("action-logs");
            data.new_logs.reverse().forEach(log => {
                const logDiv = document.createElement("div");
                logDiv.className = "log-entry";
                logDiv.innerText = log;
                logsContainer.prepend(logDiv);
            });

            // 3. Handle Game Over UI Swap
            if (data.game_over) {
                document.getElementById("controls-container").innerHTML = `
                    <div class="game-over">BATTLE OVER</div>
                    <form action="/" method="GET" style="display: flex; flex-direction: column;">
                        <button type="submit" style="color: #2ed573; border-color: #2ed573;">Play Again</button>
                    </form>
                `;
            }
        }
    </script>
</body>
</html>
