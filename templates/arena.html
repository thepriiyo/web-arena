<!DOCTYPE html>
<html>
<head>
    <title>JRPG Arena</title>
    <!-- We link a sexy RPG font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Play&display=swap" rel="stylesheet">
    <style>
        body {
            /* Background Image */
            background-image: url('{{ url_for("static", filename="images/bg.png") }}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            color: #ffffff;
            font-family: 'Play', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            text-shadow: 2px 2px 10px #000;
            margin-top: 0;
            margin-bottom: 20px;
        }

        /* Glassmorphism Container */
        .container {
            width: 800px;
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Portraits & Stats Area */
        .battlefield {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 350px;
        }

        .fighter {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 250px;
        }

        .portrait {
            width: 200px;
            height: 200px;
            border-radius: 10px;
            border: 3px solid #b8b8b8;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            object-fit: cover;
            /* Subtle breathing animation */
            animation: breathe 3s ease-in-out infinite alternate;
        }

        @keyframes breathe {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }

        .name {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            margin-top: 15px;
            text-shadow: 1px 1px 5px #000;
        }

        /* Animated Health Bars */
        .hp-bar-container {
            width: 100%;
            height: 20px;
            background-color: #333;
            border: 2px solid #000;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
            box-shadow: inset 0px 0px 5px #000;
        }

        .hp-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            /* Smoothly animates when the width changes! */
            transition: width 0.5s ease-out;
        }

        .potions {
            margin-top: 10px;
            color: #1e90ff;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .logs-and-controls {
            display: flex;
            gap: 20px;
            justify-content: space-between;
        }

        /* The Battle Log */
        .logs {
            flex-grow: 1;
            text-align: left;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 10px;
            height: 120px;
            overflow-y: auto;
            border: 1px inset #555;
            font-family: monospace;
            font-size: 1.1rem;
        }

        .log-entry {
            margin: 5px 0;
            color: #d1d8e0;
        }
        /* Highlight the newest log entry */
        .log-entry:first-child {
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        /* Controls Area */
        .controls {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
            min-width: 200px;
        }

        button {
            background: linear-gradient(180deg, #444, #222);
            color: white;
            border: 2px solid #555;
            padding: 15px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 8px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }

        button:hover {
            background: linear-gradient(180deg, #666, #333);
            border-color: #888;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        button[value="attack"] {
            border-color: #ff4757;
            color: #ff6b81;
        }

        button[value="heal"] {
            border-color: #1e90ff;
            color: #70a1ff;
        }

        .game-over {
            font-size: 2rem;
            color: #ffd32a;
            font-family: 'Cinzel', serif;
            text-shadow: 0 0 10px span;
        }
    </style>
</head>
<body>
    <h1>The Monster Arena</h1>
    <div class="container">
        
        <!-- UI Panels -->
        <div class="battlefield">
            
            <div class="fighter">
                <img src="{{ url_for('static', filename='images/hero.png') }}" class="portrait" alt="Hero">
                <div class="name">{{ player.name }}</div>
                
                <div class="hp-bar-container">
                    <!-- Jinja math to calculate percentage! -->
                    <div class="hp-bar" style="width: {{ (player.hp / 100.0) * 100 }}%;"></div>
                </div>
                <div style="margin-top: 5px;">{{ player.hp }} / 100</div>

                <div class="potions">🧪 Potions: {{ player.potions }}</div>
            </div>

            <h2 style="font-family: 'Cinzel', serif; font-size: 3rem; color: #ffeb3b; text-shadow: 0 0 10px #ff0;">VS</h2>

            <div class="fighter">
                <img src="{{ url_for('static', filename='images/dragon.png') }}" class="portrait" alt="Dragon" style="border-color: #ff4757;">
                <div class="name" style="color: #ff4757;">{{ dragon.name }}</div>
                
                <div class="hp-bar-container">
                    <!-- Dragon has 150 max HP -->
                    <div class="hp-bar" style="width: {{ (dragon.hp / 150.0) * 100 }}%;"></div>
                </div>
                <div style="margin-top: 5px;">{{ dragon.hp }} / 150</div>
            </div>

        </div>

        <div class="logs-and-controls">
            <!-- Action Logs -->
            <div class="logs">
                {% for log in logs %}
                    <div class="log-entry">{{ log }}</div>
                {% endfor %}
            </div>

            <!-- Controls -->
            <div class="controls">
                {% if game_over %}
                    <form action="/" method="GET" style="display: flex; flex-direction: column;">
                        <button type="submit" style="color: #2ed573; border-color: #2ed573;">Play Again</button>
                    </form>
                {% else %}
                    <form action="/play" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
                        <button type="submit" name="action" value="attack">🗡️ Attack</button>
                        <button type="submit" name="action" value="heal">🧪 Heal</button>
                    </form>
                {% endif %}
            </div>
        </div>

    </div>
</body>
</html>
